apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: stats-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: stats-service
  namespaceSelector:
    matchNames:
      - microservices
  endpoints:
    - port: http
      path: /metrics
      interval: 5s
