version: "3.9"
services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  job-api:
    build:
      context: .
      dockerfile: apps/job-api/Dockerfile
    container_name: job-api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_HOST=redis://redis:6379
    depends_on:
      - redis
    restart: always

  worker-service:
    build:
      context: .
      dockerfile: apps/worker-service/Dockerfile

    environment:
      - REDIS_HOST=redis://redis:6379
    depends_on:
      - redis

volumes:
  redis_data: